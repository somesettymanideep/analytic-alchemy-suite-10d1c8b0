<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3FD"/><stop offset="1" stop-color="#E1EAFB"/>
    </linearGradient>
    <linearGradient id="dStep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/><stop offset="1" stop-color="#1746c9"/>
    </linearGradient>
    <filter id="dShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#12245b" flood-opacity="0.18"/>
    </filter>
    <pattern id="dDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#2f6bff" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="820" rx="28" fill="url(#dBg)"/>
  <rect width="1200" height="820" rx="28" fill="url(#dDots)"/>

  <!-- rising maturity arrow (decorative, behind steps) -->
  <path d="M160,650 L360,565 L580,475 L800,385" fill="none" stroke="#9db8ff" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M820,378 l26,-6 l-3,26" fill="none" stroke="#1746c9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== steps ===== -->
  <!-- step 1 -->
  <g filter="url(#dShadow)"><rect x="90" y="600" width="235" height="118" rx="18" fill="#ffffff"/></g>
  <circle cx="130" cy="640" r="22" fill="#eaf1ff"/>
  <text x="130" y="647" fill="#1746c9" font-size="18" font-weight="800" text-anchor="middle">1</text>
  <text x="168" y="636" fill="#0d1547" font-size="19" font-weight="800">Discovery</text>
  <text x="168" y="660" fill="#64748b" font-size="13">Current-state landscape</text>

  <!-- step 2 -->
  <g filter="url(#dShadow)"><rect x="335" y="510" width="235" height="118" rx="18" fill="#ffffff"/></g>
  <circle cx="375" cy="550" r="22" fill="#eaf1ff"/>
  <text x="375" y="557" fill="#1746c9" font-size="18" font-weight="800" text-anchor="middle">2</text>
  <text x="413" y="546" fill="#0d1547" font-size="19" font-weight="800">Assessment</text>
  <text x="413" y="570" fill="#64748b" font-size="13">32 interviews · 39 workshops</text>

  <!-- step 3 -->
  <g filter="url(#dShadow)"><rect x="580" y="420" width="235" height="118" rx="18" fill="url(#dStep)"/></g>
  <circle cx="620" cy="460" r="22" fill="#ffffff" opacity="0.18"/>
  <text x="620" y="467" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">3</text>
  <text x="658" y="456" fill="#ffffff" font-size="19" font-weight="800">Data Strategy</text>
  <text x="658" y="480" fill="#cfe0ff" font-size="13">DAMA-based future state</text>

  <!-- step 4 -->
  <g filter="url(#dShadow)"><rect x="825" y="330" width="235" height="118" rx="18" fill="#ffffff"/></g>
  <circle cx="865" cy="370" r="22" fill="#fff3d6"/>
  <text x="865" y="377" fill="#e0a30f" font-size="18" font-weight="800" text-anchor="middle">4</text>
  <text x="903" y="366" fill="#0d1547" font-size="19" font-weight="800">Blueprint</text>
  <text x="903" y="390" fill="#64748b" font-size="13">Fit-gap &amp; design sign-off</text>

  <!-- ===== maturity card (top-left) ===== -->
  <g filter="url(#dShadow)"><rect x="120" y="110" width="320" height="150" rx="20" fill="#ffffff"/></g>
  <text x="148" y="152" fill="#0d1547" font-size="17" font-weight="800">Data Maturity</text>
  <!-- 5-segment maturity bar: 3 filled -->
  <rect x="148" y="176" width="50" height="20" rx="6" fill="url(#dStep)"/>
  <rect x="204" y="176" width="50" height="20" rx="6" fill="url(#dStep)"/>
  <rect x="260" y="176" width="50" height="20" rx="6" fill="url(#dStep)"/>
  <rect x="316" y="176" width="50" height="20" rx="6" fill="#e2eafb"/>
  <rect x="372" y="176" width="40" height="20" rx="6" fill="#e2eafb"/>
  <text x="148" y="238" fill="#1746c9" font-size="22" font-weight="800">Level 3 → 5</text>
  <circle cx="398" cy="230" r="8" fill="#f5b51a"/>

  <!-- ===== DAMA badge (top-right) ===== -->
  <g filter="url(#dShadow)"><rect x="820" y="150" width="230" height="60" rx="30" fill="#0d1547"/></g>
  <circle cx="854" cy="180" r="15" fill="#2f6bff"/>
  <path d="M847,180 l5,6 l9,-11" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="880" y="186" fill="#ffffff" font-size="16" font-weight="700">DAMA Framework</text>
</svg>
