<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="uBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3FD"/><stop offset="1" stop-color="#E1EAFB"/>
    </linearGradient>
    <linearGradient id="uHub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/><stop offset="1" stop-color="#1746c9"/>
    </linearGradient>
    <filter id="uShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#12245b" flood-opacity="0.18"/>
    </filter>
    <pattern id="uDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#2f6bff" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="820" rx="28" fill="url(#uBg)"/>
  <rect width="1200" height="820" rx="28" fill="url(#uDots)"/>

  <text x="100" y="126" fill="#64748b" font-size="14" font-weight="700" letter-spacing="1">4 FRAGMENTED SOURCES</text>

  <!-- connecting lines from source right-edge (x270) to hub left (x452) -->
  <g stroke="#9db8ff" stroke-width="4" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M270,192 C370,220 400,360 452,396"/>
    <path d="M270,312 C370,330 410,384 452,406"/>
    <path d="M270,432 C370,420 410,418 452,418"/>
    <path d="M270,552 C380,520 410,452 452,430"/>
  </g>

  <!-- ===== source cards (icon left, text right) ===== -->
  <!-- card 1 -->
  <g filter="url(#uShadow)"><rect x="95" y="150" width="175" height="84" rx="16" fill="#ffffff"/></g>
  <g transform="translate(120,176)" fill="none" stroke="#2f6bff" stroke-width="4"><ellipse cx="12" cy="6" rx="12" ry="6"/><path d="M0,6 v20 a12,6 0 0 0 24,0 v-20"/></g>
  <text x="160" y="186" fill="#0d1547" font-size="15" font-weight="700">SAP S/4HANA</text>
  <text x="160" y="206" fill="#64748b" font-size="12">Transactional</text>
  <!-- card 2 -->
  <g filter="url(#uShadow)"><rect x="95" y="270" width="175" height="84" rx="16" fill="#ffffff"/></g>
  <g transform="translate(120,296)" fill="none" stroke="#2f6bff" stroke-width="4"><ellipse cx="12" cy="6" rx="12" ry="6"/><path d="M0,6 v20 a12,6 0 0 0 24,0 v-20"/></g>
  <text x="160" y="306" fill="#0d1547" font-size="15" font-weight="700">Marketing</text>
  <text x="160" y="326" fill="#64748b" font-size="12">Campaign data</text>
  <!-- card 3 -->
  <g filter="url(#uShadow)"><rect x="95" y="390" width="175" height="84" rx="16" fill="#ffffff"/></g>
  <g transform="translate(120,416)" fill="none" stroke="#2f6bff" stroke-width="4"><ellipse cx="12" cy="6" rx="12" ry="6"/><path d="M0,6 v20 a12,6 0 0 0 24,0 v-20"/></g>
  <text x="160" y="426" fill="#0d1547" font-size="15" font-weight="700">Legacy DWH</text>
  <text x="160" y="446" fill="#64748b" font-size="12">Data warehouse</text>
  <!-- card 4 -->
  <g filter="url(#uShadow)"><rect x="95" y="510" width="175" height="84" rx="16" fill="#ffffff"/></g>
  <g transform="translate(120,536)" fill="none" stroke="#2f6bff" stroke-width="4"><ellipse cx="12" cy="6" rx="12" ry="6"/><path d="M0,6 v20 a12,6 0 0 0 24,0 v-20"/></g>
  <text x="160" y="546" fill="#0d1547" font-size="15" font-weight="700">Enterprise</text>
  <text x="160" y="566" fill="#64748b" font-size="12">Other systems</text>

  <!-- ===== central hub ===== -->
  <g filter="url(#uShadow)"><circle cx="562" cy="412" r="112" fill="url(#uHub)"/></g>
  <g transform="translate(530,360)" fill="none" stroke="#ffffff" stroke-width="5">
    <ellipse cx="32" cy="12" rx="32" ry="12" fill="#ffffff" opacity="0.2" stroke="none"/>
    <ellipse cx="32" cy="12" rx="32" ry="12"/>
    <path d="M0,12 v42 a32,12 0 0 0 64,0 v-42"/>
    <path d="M0,33 a32,12 0 0 0 64,0"/>
  </g>
  <text x="562" y="456" fill="#ffffff" font-size="21" font-weight="800" text-anchor="middle">SAP</text>
  <text x="562" y="478" fill="#cfe0ff" font-size="15" text-anchor="middle">Datasphere</text>

  <!-- flow hub -> dashboard -->
  <path d="M678,412 l72,0 m-15,-12 l15,12 l-15,12" fill="none" stroke="#1746c9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== dashboard card ===== -->
  <g filter="url(#uShadow)"><rect x="790" y="252" width="330" height="320" rx="22" fill="#ffffff"/></g>
  <text x="822" y="296" fill="#0d1547" font-size="18" font-weight="800">Unified Analytics</text>
  <rect x="1044" y="278" width="52" height="24" rx="12" fill="#e7f6ec"/>
  <circle cx="1058" cy="290" r="4" fill="#1f9d55"/>
  <text x="1068" y="295" fill="#1f9d55" font-size="12" font-weight="700">LIVE</text>
  <!-- bars -->
  <rect x="822" y="470" width="34" height="60" rx="5" fill="#2f6bff"/>
  <rect x="868" y="440" width="34" height="90" rx="5" fill="#2f6bff"/>
  <rect x="914" y="408" width="34" height="122" rx="5" fill="#2f6bff"/>
  <rect x="960" y="458" width="34" height="72" rx="5" fill="#f5b51a"/>
  <!-- donut -->
  <circle cx="1058" cy="450" r="44" fill="none" stroke="#e6edfb" stroke-width="16"/>
  <path d="M1058,406 a44,44 0 0 1 38,66" fill="none" stroke="#1746c9" stroke-width="16" stroke-linecap="round"/>
  <text x="1058" y="456" fill="#0d1547" font-size="16" font-weight="800" text-anchor="middle">40+</text>
  <text x="822" y="556" fill="#64748b" font-size="13">40+ business KPIs · one source</text>

  <!-- ===== chip ===== -->
  <g filter="url(#uShadow)"><rect x="452" y="150" width="220" height="58" rx="29" fill="#0d1547"/></g>
  <path d="M486,178 l7,7 l13,-15" fill="none" stroke="#f5b51a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="520" y="185" fill="#ffffff" font-size="16" font-weight="700">1 Source of Truth</text>
</svg>
