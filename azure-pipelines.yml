# CI/CD for ngsit.nl (React UI)
# Runs on the self-hosted Linux agent on the VM.
trigger:
  branches:
    include:
      - main

pool:
  name: Default
  demands:
    - agent.name -equals vmwcommon-linux

steps:
  - script: |
      set -e
      echo "Building UI..."
      npm ci --no-audit --no-fund
      npm run build
    displayName: 'Install & build'

  - script: |
      set -e
      echo "Deploying UI to nginx web root..."
      sudo rsync -a --delete "$(Build.SourcesDirectory)/dist/" /var/www/ngsit/
      sudo chown -R www-data:www-data /var/www/ngsit
      sudo nginx -t
      sudo systemctl reload nginx
    displayName: 'Deploy & reload nginx'
